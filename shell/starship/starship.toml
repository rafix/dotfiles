# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$status\
$directory\
$git_branch\
$git_status\
$character"""

# ── Directory ──────────────────────────────────────────────
[directory]
style = "yellow bold"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

# ── Git ────────────────────────────────────────────────────
[git_branch]
format = " on [$symbol$branch]($style)"
symbol = " "
style = "green bold"

[git_status]
format = '([ $all_status$ahead_behind]($style) )'
style = "yellow"
conflicted = "✗"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# ── Status (exit code indicator) ───────────────────────────
[status]
format = "[$symbol]($style) "
symbol = "[❯](green)"
error_symbol = "[❯](red)"
success_symbol = "[❯](green)"
disabled = false

# ── Character (input cursor) ───────────────────────────────
[character]
success_symbol = ""
error_symbol = ""

# ── Disable unused modules ─────────────────────────────────
[aws]
disabled = true
[gcloud]
disabled = true
[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[golang]
disabled = true
[rust]
disabled = true
[java]
disabled = true
[docker_context]
disabled = true
[terraform]
disabled = true
[time]
disabled = true
