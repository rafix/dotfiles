# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$python\
$golang\
$rust\
$java\
$terraform\
$line_break\
$character"""

# ── Directory ──────────────────────────────────────────────
[directory]
style = "yellow bold"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

# ── Git ────────────────────────────────────────────────────
[git_branch]
format = " [$symbol$branch]($style)"
symbol = "⎇ "
style = "cyan bold"
truncation_length = 30
truncation_symbol = "…"

[git_status]
format = '([ \[$all_status$ahead_behind\]]($style) )'
style = "yellow bold"
conflicted = "✗"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "[+](green)"
renamed = "»"
deleted = "[✘](red)"

# ── Fill (pushes language to the right) ───────────────────
[fill]
symbol = " "

# ── Status (exit code indicator) ───────────────────────────
[status]
disabled = true

# ── Character (input cursor) ───────────────────────────────
[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

# ── Disable unused modules ─────────────────────────────────
[aws]
disabled = true
[gcloud]
disabled = true
[package]
disabled = true
[nodejs]
format = "[$symbol($version )]($style)"
symbol = "⬡ "
style = "green bold"

[python]
format = "[$symbol($version )]($style)"
symbol = "🐍 "
style = "yellow bold"

[golang]
format = "[$symbol($version )]($style)"
symbol = "🐹 "
style = "cyan bold"

[rust]
format = "[$symbol($version )]($style)"
symbol = "⚙ "
style = "red bold"

[java]
format = "[$symbol($version )]($style)"
symbol = "☕ "
style = "red bold"

[terraform]
format = "[$symbol$workspace ]($style)"
symbol = "◈ "
style = "purple bold"

[docker_context]
disabled = true
[time]
disabled = true
